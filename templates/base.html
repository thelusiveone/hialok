<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Alok Shukla - Python Software Developer{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Alok Shukla - Python Software Developer building fast, scalable backends with FastAPI, Django, and modern Python.{% endblock %}">

    <!-- Open Graph -->
    <meta property="og:title" content="{% block og_title %}Alok Shukla - Python Software Developer{% endblock %}">
    <meta property="og:description" content="Building fast, scalable backends with Python">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hialok.com">

    <!-- Prevent flash of wrong theme -->
    <script>
        (function() {
            const stored = localStorage.getItem('theme');
            if (stored === 'light') {
                document.documentElement.classList.remove('dark');
            } else if (stored === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (!window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased transition-colors duration-300">

    {% include "components/navbar.html" %}

    <main id="main" class="min-h-screen">
        {% block content %}{% endblock %}
    </main>

    {% include "components/footer.html" %}

    <!-- Floating Spotify Widget (bottom-left corner) -->
    <div id="spotify-floating" class="fixed bottom-5 left-5 z-40"
         hx-get="/api/spotify" hx-trigger="load, every {{ spotify_poll_interval }}s" hx-swap="innerHTML">
        {% include "components/spotify_widget.html" %}
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
