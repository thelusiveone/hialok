<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Alok Shukla - Python Software Developer{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Alok Shukla - Python Software Developer building fast, scalable backends with FastAPI, Django, and modern Python.{% endblock %}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

    <!-- Open Graph -->
    <meta property="og:title" content="{% block og_title %}Alok Shukla - Python Software Developer{% endblock %}">
    <meta property="og:description" content="Building fast, scalable backends with Python">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hialok.com">

    <!-- Mark JS as available (enables typed-command animations) -->
    <script>document.documentElement.classList.add('js');</script>

    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                        sans: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        term: {
                            bg: '#0d1117',
                            surface: '#161b22',
                            border: '#30363d',
                            green: '#3fb950',
                            yellow: '#d29922',
                            red: '#f85149',
                            blue: '#58a6ff',
                            purple: '#a371f7',
                            cyan: '#39c5cf',
                            orange: '#f97316',
                            text: '#c9d1d9',
                            muted: '#8b949e',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-term-bg text-term-text font-mono antialiased scanlines">
    <!-- Terminal window frame -->
    <div class="min-h-screen">
        {% include "components/navbar.html" %}

        <main id="main">
            {% block content %}{% endblock %}
        </main>

        {% include "components/footer.html" %}
    </div>

    <!-- Floating Spotify Widget -->
    <div id="spotify-floating" class="fixed bottom-5 left-5 z-40"
         hx-get="/api/spotify" hx-trigger="load, every {{ spotify_poll_interval }}s" hx-swap="innerHTML">
        {% include "components/spotify_widget.html" %}
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
