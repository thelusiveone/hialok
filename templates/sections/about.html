<section id="about" class="py-20 px-4 sm:px-6">
    <div class="max-w-4xl mx-auto">
        <div class="term-window bg-term-surface border border-term-border rounded-lg overflow-hidden">
            <!-- Terminal header -->
            <div class="flex items-center gap-2 px-4 py-2 bg-term-bg border-b border-term-border">
                <span class="text-xs text-term-muted">~/about</span>
            </div>

            <div class="p-6 sm:p-8 space-y-6 text-sm sm:text-base term-block">
                <!-- Command -->
                <p class="term-cmd text-term-text" data-cmd="cat README.md"><span class="text-term-green">$ </span>cat README.md</p>

                <!-- About content -->
                <div class="term-out space-y-4 pl-2 border-l-2 border-term-green/30">
                    <h2 class="text-xl font-bold text-term-green"># About Me</h2>
                    <p class="text-term-text leading-relaxed">
                        {{ about.description | replace('\n', ' ') }}
                    </p>
                </div>

                <div class="term-out border-t border-term-border my-6"></div>

                <!-- Stats as command output -->
                <p class="term-out text-term-muted"><span class="text-term-green">$</span> ./stats.sh --summary</p>
                <div class="term-out grid grid-cols-2 sm:grid-cols-4 gap-4 mt-4">
                    {% for stat in about.stats %}
                    <div class="bg-term-bg border border-term-border rounded p-4 text-center hover:border-term-orange/50 transition-colors">
                        <p class="text-2xl font-bold text-term-orange glow-orange">{{ stat.value }}</p>
                        <p class="text-xs text-term-muted mt-1">{{ stat.label }}</p>
                    </div>
                    {% endfor %}
                </div>

                <!-- Cursor -->
                <p class="text-term-muted mt-6">
                    <span class="text-term-green">➜</span> <span class="text-term-blue">~/about</span> <span class="cursor-blink inline-block w-2 h-4 bg-term-text/70 align-text-bottom"></span>
                </p>
            </div>
        </div>
    </div>
</section>
