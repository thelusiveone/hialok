<section id="experience" class="py-24 px-4 sm:px-6">
    <div class="max-w-6xl mx-auto">
        <div class="animate-on-scroll">
            <!-- Section header -->
            <div class="flex items-center gap-3 mb-12">
                <span class="text-brand-500 font-mono text-sm font-semibold">03.</span>
                <h2 class="text-3xl sm:text-4xl font-bold text-gray-900 dark:text-white">Experience</h2>
                <div class="flex-1 h-px bg-gray-200 dark:bg-gray-800 max-w-xs"></div>
            </div>

            <!-- Timeline -->
            <div class="relative">
                <!-- Vertical line -->
                <div class="absolute left-0 md:left-8 top-0 bottom-0 w-px bg-gradient-to-b from-brand-500 via-purple-500 to-gray-300 dark:to-gray-700"></div>

                <div class="space-y-12">
                    {% for job in experience %}
                    <div class="relative pl-8 md:pl-20">
                        <!-- Timeline dot -->
                        <div class="absolute left-0 md:left-8 -translate-x-1/2 w-3 h-3 rounded-full bg-brand-500 border-4 border-white dark:border-gray-950 shadow-lg shadow-brand-500/20"></div>

                        <!-- Period badge (desktop) -->
                        <div class="hidden md:block absolute left-0 -translate-x-full pr-6 top-0">
                            <span class="text-xs font-mono text-gray-400 whitespace-nowrap">{{ job.period }}</span>
                        </div>

                        <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 hover:border-brand-500/30 transition-colors">
                            <!-- Period badge (mobile) -->
                            <span class="md:hidden inline-block text-xs font-mono text-brand-500 bg-brand-500/10 px-2 py-0.5 rounded mb-2">{{ job.period }}</span>

                            <h3 class="text-lg font-bold text-gray-900 dark:text-white">{{ job.role }}</h3>
                            <p class="text-sm text-brand-500 font-semibold mb-4">{{ job.company }}</p>

                            <ul class="space-y-2">
                                {% for highlight in job.highlights %}
                                <li class="flex items-start gap-2 text-sm text-gray-600 dark:text-gray-400 leading-relaxed">
                                    <svg class="w-4 h-4 text-brand-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                    {{ highlight }}
                                </li>
                                {% endfor %}
                            </ul>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</section>
