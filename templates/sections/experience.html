<section id="experience" class="py-20 px-4 sm:px-6">
    <div class="max-w-4xl mx-auto">
        <div class="term-window bg-term-surface border border-term-border rounded-lg overflow-hidden">
            <!-- Terminal header -->
            <div class="flex items-center gap-2 px-4 py-2 bg-term-bg border-b border-term-border">
                <span class="text-xs text-term-muted">~/experience</span>
            </div>

            <div class="p-6 sm:p-8 space-y-6 text-sm sm:text-base term-block">
                <!-- Git log style -->
                <p class="term-cmd text-term-text" data-cmd="git log --oneline --graph career.md"><span class="text-term-green">$ </span>git log --oneline --graph career.md</p>

                <div class="term-out space-y-6 mt-4">
                    {% for job in experience %}
                    <div class="relative pl-6 border-l-2 border-term-green/30">
                        <!-- Git commit dot -->
                        <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-term-green border-2 border-term-surface"></div>
                        
                        <!-- Commit hash style header -->
                        <div class="flex flex-wrap items-center gap-2 mb-2">
                            <span class="text-term-yellow font-bold">{{ job.role }}</span>
                            <span class="text-term-muted">@</span>
                            <span class="text-term-blue">{{ job.company }}</span>
                        </div>
                        
                        <p class="text-term-muted text-xs mb-3">
                            <span class="text-term-purple">Date:</span> {{ job.period }}
                        </p>

                        <!-- Commit message / highlights -->
                        <ul class="space-y-1.5">
                            {% for highlight in job.highlights %}
                            <li class="flex items-start gap-2">
                                <span class="text-term-green mt-0.5">+</span>
                                <span class="text-term-text">{{ highlight }}</span>
                            </li>
                            {% endfor %}
                        </ul>
                    </div>
                    {% endfor %}
                </div>

                <!-- Cursor -->
                <p class="text-term-muted mt-6">
                    <span class="text-term-green">➜</span> <span class="text-term-blue">~/experience</span> <span class="cursor-blink inline-block w-2 h-4 bg-term-text/70 align-text-bottom"></span>
                </p>
            </div>
        </div>
    </div>
</section>
