<section id="contact" class="py-20 px-4 sm:px-6">
    <div class="max-w-4xl mx-auto">
        <div class="term-window bg-term-surface border border-term-border rounded-lg overflow-hidden">
            <!-- Terminal header -->
            <div class="flex items-center gap-2 px-4 py-2 bg-term-bg border-b border-term-border">
                <span class="text-xs text-term-muted">~/contact</span>
            </div>

            <div class="p-6 sm:p-8 space-y-6 text-sm sm:text-base term-block">
                <!-- Run contact script -->
                <p class="term-cmd text-term-text" data-cmd="./contact.sh --interactive"><span class="text-term-green">$ </span>./contact.sh --interactive</p>

                <div class="term-out bg-term-bg border border-term-border rounded-lg p-6">
                    <p class="text-term-green mb-6">Initiating contact protocol...</p>

                    <!-- Contact form styled as terminal input -->
                    <form hx-post="/api/contact" hx-ext="json-enc" hx-target="#contact-result" hx-swap="innerHTML" class="space-y-4">
                        <div>
                            <label class="block text-term-purple mb-2">name <span class="text-term-muted">(required)</span>:</label>
                            <input 
                                type="text" 
                                name="name" 
                                required
                                class="w-full bg-term-surface border border-term-border rounded px-4 py-2 text-term-text focus:border-term-green focus:outline-none"
                                placeholder=">>> "
                            >
                        </div>

                        <div>
                            <label class="block text-term-purple mb-2">email <span class="text-term-muted">(required)</span>:</label>
                            <input 
                                type="email" 
                                name="email" 
                                required
                                class="w-full bg-term-surface border border-term-border rounded px-4 py-2 text-term-text focus:border-term-green focus:outline-none"
                                placeholder=">>> "
                            >
                        </div>

                        <div>
                            <label class="block text-term-purple mb-2">message <span class="text-term-muted">(required)</span>:</label>
                            <textarea 
                                name="message" 
                                rows="4" 
                                required
                                class="w-full bg-term-surface border border-term-border rounded px-4 py-2 text-term-text focus:border-term-green focus:outline-none resize-none"
                                placeholder=">>> Enter your message..."
                            ></textarea>
                        </div>

                        <button 
                            type="submit" 
                            class="px-6 py-2 bg-term-green/10 border border-term-green/30 text-term-green rounded hover:bg-term-green/20 transition-colors"
                        >
                            $ send --execute
                        </button>
                    </form>

                    <div id="contact-result" class="mt-4"></div>
                </div>

                <div class="term-out border-t border-term-border my-6"></div>

                <!-- Alternative contact methods -->
                <p class="term-out text-term-muted"><span class="text-term-green">$</span> echo $CONTACT_METHODS</p>
                <div class="term-out grid grid-cols-1 sm:grid-cols-2 gap-3 mt-4 pl-2">
                    <a href="mailto:{{ contact_email }}" class="flex items-center gap-3 text-term-blue hover:text-term-cyan transition-colors">
                        <span class="text-term-muted">email:</span> {{ contact_email }}
                    </a>
                    <a href="{{ linkedin_url }}" target="_blank" class="flex items-center gap-3 text-term-blue hover:text-term-cyan transition-colors">
                        <span class="text-term-muted">linkedin:</span> /in/alokshukla
                    </a>
                    <a href="{{ github_url }}" target="_blank" class="flex items-center gap-3 text-term-blue hover:text-term-cyan transition-colors">
                        <span class="text-term-muted">github:</span> @alokshukla
                    </a>
                    <a href="{{ twitter_url }}" target="_blank" class="flex items-center gap-3 text-term-blue hover:text-term-cyan transition-colors">
                        <span class="text-term-muted">twitter:</span> @alokshukla
                    </a>
                </div>

                <!-- Cursor -->
                <p class="text-term-muted mt-6">
                    <span class="text-term-green">➜</span> <span class="text-term-blue">~/contact</span> <span class="cursor-blink inline-block w-2 h-4 bg-term-text/70 align-text-bottom"></span>
                </p>
            </div>
        </div>
    </div>
</section>
