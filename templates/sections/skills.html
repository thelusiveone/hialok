<section id="skills" class="py-24 px-4 sm:px-6 bg-gray-50/50 dark:bg-gray-900/30">
    <div class="max-w-6xl mx-auto">
        <div class="animate-on-scroll">
            <!-- Section header -->
            <div class="flex items-center gap-3 mb-12">
                <span class="text-brand-500 font-mono text-sm font-semibold">02.</span>
                <h2 class="text-3xl sm:text-4xl font-bold text-gray-900 dark:text-white">Skills</h2>
                <div class="flex-1 h-px bg-gray-200 dark:bg-gray-800 max-w-xs"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Languages -->
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="p-2 rounded-lg bg-brand-500/10">
                            <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 dark:text-white">Languages</h3>
                    </div>
                    <div class="space-y-4">
                        {% for skill in skills.languages %}
                        <div>
                            <div class="flex justify-between items-center mb-1.5">
                                <span class="text-sm font-medium text-gray-700 dark:text-gray-300">{{ skill.name }}</span>
                                <span class="text-xs font-mono text-gray-400">{{ skill.level }}%</span>
                            </div>
                            <div class="h-1.5 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden">
                                <div class="skill-bar-fill h-full bg-gradient-to-r from-brand-500 to-brand-400 rounded-full" style="width: {{ skill.level }}%"></div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <!-- Frameworks -->
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="p-2 rounded-lg bg-purple-500/10">
                            <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 dark:text-white">Frameworks</h3>
                    </div>
                    <div class="space-y-4">
                        {% for skill in skills.frameworks %}
                        <div>
                            <div class="flex justify-between items-center mb-1.5">
                                <span class="text-sm font-medium text-gray-700 dark:text-gray-300">{{ skill.name }}</span>
                                <span class="text-xs font-mono text-gray-400">{{ skill.level }}%</span>
                            </div>
                            <div class="h-1.5 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden">
                                <div class="skill-bar-fill h-full bg-gradient-to-r from-purple-500 to-purple-400 rounded-full" style="width: {{ skill.level }}%"></div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <!-- Tools -->
                <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="p-2 rounded-lg bg-emerald-500/10">
                            <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 dark:text-white">Tools & DevOps</h3>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        {% for tool in skills.tools %}
                        <span class="px-3 py-1.5 text-sm font-medium bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded-lg border border-gray-200 dark:border-gray-700 hover:border-emerald-500/50 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">
                            {{ tool }}
                        </span>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
