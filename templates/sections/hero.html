<section id="hero" class="relative min-h-screen flex items-center justify-center pt-16 overflow-hidden">
    <!-- Background gradient -->
    <div class="absolute inset-0 bg-gradient-to-br from-brand-500/5 via-transparent to-purple-500/5 dark:from-brand-500/10 dark:via-transparent dark:to-purple-500/10"></div>
    <div class="absolute top-1/4 -left-1/4 w-96 h-96 bg-brand-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 -right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>

    <div class="relative max-w-4xl mx-auto px-4 sm:px-6 text-center">
        <!-- Terminal badge -->
        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-gray-100 dark:bg-gray-800/80 border border-gray-200 dark:border-gray-700 mb-8 animate-fade-in-up">
            <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
            <span class="text-xs font-mono text-gray-500 dark:text-gray-400">Available for opportunities</span>
        </div>

        <!-- Name -->
        <h1 class="text-5xl sm:text-6xl lg:text-7xl font-extrabold tracking-tight mb-4 animate-fade-in-up" style="animation-delay: 0.1s">
            <span class="text-gray-900 dark:text-white">Hi, I'm </span>
            <span class="bg-gradient-to-r from-brand-500 to-purple-500 bg-clip-text text-transparent">{{ name }}</span>
        </h1>

        <!-- Title with cursor -->
        <div class="mb-6 animate-fade-in-up" style="animation-delay: 0.2s">
            <p class="text-xl sm:text-2xl font-mono text-gray-600 dark:text-gray-400">
                <span class="text-brand-500">$</span> {{ title }}<span class="cursor-blink"></span>
            </p>
        </div>

        <!-- Social Icons -->
        <div class="flex items-center justify-center gap-3 mb-8 animate-fade-in-up" style="animation-delay: 0.25s">
            <a href="{{ linkedin_url }}" target="_blank" rel="noopener" class="p-2.5 rounded-xl text-gray-400 hover:text-white hover:bg-blue-600 transition-all duration-300 hover:shadow-lg hover:shadow-blue-600/25 hover:scale-110" aria-label="LinkedIn">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </a>
            <a href="{{ twitter_url }}" target="_blank" rel="noopener" class="p-2.5 rounded-xl text-gray-400 hover:text-white hover:bg-gray-900 dark:hover:bg-white dark:hover:text-gray-900 transition-all duration-300 hover:shadow-lg hover:shadow-gray-900/25 dark:hover:shadow-white/25 hover:scale-110" aria-label="X / Twitter">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
            <a href="mailto:{{ contact_email }}" class="p-2.5 rounded-xl text-gray-400 hover:text-white hover:bg-brand-500 transition-all duration-300 hover:shadow-lg hover:shadow-brand-500/25 hover:scale-110" aria-label="Email">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </a>
        </div>

        <!-- Tagline -->
        <p class="text-lg sm:text-xl text-gray-500 dark:text-gray-400 max-w-2xl mx-auto mb-10 leading-relaxed animate-fade-in-up" style="animation-delay: 0.3s">
            {{ tagline }}
        </p>

        <!-- CTAs -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-16 animate-fade-in-up" style="animation-delay: 0.4s">
            <a href="#projects" class="px-8 py-3.5 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-xl shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40 transition-all duration-300 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                View My Projects
            </a>
            <a href="#contact" class="px-8 py-3.5 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-900 dark:text-white font-semibold rounded-xl border border-gray-200 dark:border-gray-700 transition-all duration-300 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                Get In Touch
            </a>
        </div>

        <!-- Scroll indicator (below buttons) -->
        <div class="animate-bounce animate-fade-in-up" style="animation-delay: 0.5s">
            <svg class="w-5 h-5 mx-auto text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
            </svg>
        </div>
    </div>
</section>
