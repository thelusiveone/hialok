<div class="group relative bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden hover:border-brand-500/50 dark:hover:border-brand-500/30 transition-all duration-300 hover:shadow-lg hover:shadow-brand-500/5">
    <!-- Image placeholder -->
    <div class="h-48 bg-gradient-to-br from-brand-500/10 to-purple-500/10 dark:from-brand-500/5 dark:to-purple-500/5 flex items-center justify-center">
        <div class="text-4xl font-bold font-mono text-brand-500/30 dark:text-brand-400/20 group-hover:text-brand-500/50 transition-colors">
            {{ project.title[:2] }}
        </div>
    </div>

    <div class="p-5">
        <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2 group-hover:text-brand-500 transition-colors">
            {{ project.title }}
        </h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed mb-4">
            {{ project.description }}
        </p>

        <!-- Tech Tags -->
        <div class="flex flex-wrap gap-1.5 mb-4">
            {% for tech in project.tech %}
            <span class="px-2 py-0.5 text-xs font-medium bg-brand-500/10 text-brand-600 dark:text-brand-400 rounded-md">
                {{ tech }}
            </span>
            {% endfor %}
        </div>

        <!-- Links -->
        <div class="flex items-center gap-3">
            {% if project.github %}
            <a href="{{ project.github }}" target="_blank" rel="noopener" class="flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400 hover:text-brand-500 dark:hover:text-brand-400 transition-colors">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                Code
            </a>
            {% endif %}
            {% if project.live %}
            <a href="{{ project.live }}" target="_blank" rel="noopener" class="flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400 hover:text-brand-500 dark:hover:text-brand-400 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                Live Demo
            </a>
            {% endif %}
        </div>
    </div>
</div>
