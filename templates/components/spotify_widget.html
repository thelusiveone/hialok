{% if track %}
<a href="{{ track.spotify_url }}" target="_blank" rel="noopener"
   class="spotify-container flex items-center gap-3 px-3 py-2 rounded
          bg-term-surface border border-term-border
          hover:border-term-green/50 transition-all duration-300 cursor-pointer group">

    <!-- Album Art -->
    <div class="relative flex-shrink-0">
        <img src="{{ track.album_art }}" alt="Album art"
             class="w-9 h-9 rounded {% if track.is_playing %}spotify-spin{% endif %}" loading="lazy">
        {% if track.is_playing %}
        <span class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-term-green rounded-full border-2 border-term-surface"></span>
        {% endif %}
    </div>

    <!-- Track Info -->
    <div class="min-w-0 max-w-[140px]">
        <p class="text-xs font-medium text-term-text truncate">{{ track.track_name }}</p>
        <p class="text-[10px] text-term-muted truncate">{{ track.artist }}</p>
    </div>

    <!-- Equalizer Bars -->
    {% if track.is_playing %}
    <div class="flex items-end gap-[2px] h-3 ml-1 flex-shrink-0">
        <span class="eq-bar w-[2px] rounded-sm bg-term-green"></span>
        <span class="eq-bar w-[2px] rounded-sm bg-term-green" style="animation-delay: 0.2s"></span>
        <span class="eq-bar w-[2px] rounded-sm bg-term-green" style="animation-delay: 0.4s"></span>
    </div>
    {% else %}
    <span class="text-[10px] text-term-muted ml-1">paused</span>
    {% endif %}
</a>
{% else %}
<div class="spotify-container flex items-center gap-2 px-3 py-2 rounded
            bg-term-surface border border-term-border">
    <span class="text-term-muted text-xs">$ spotify --status</span>
    <span class="text-term-red text-xs">offline</span>
</div>
{% endif %}
