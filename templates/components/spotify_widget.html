{% if track %}
<a href="{{ track.spotify_url }}" target="_blank" rel="noopener"
   class="spotify-container flex items-center gap-3 pl-2 pr-4 py-2 rounded-full
          bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl
          border border-gray-200/60 dark:border-gray-700/40
          shadow-lg shadow-black/5 dark:shadow-black/30
          hover:shadow-xl hover:scale-[1.03] hover:border-green-500/40
          transition-all duration-300 cursor-pointer group">

    <!-- Album Art -->
    <div class="relative flex-shrink-0">
        <img src="{{ track.album_art }}" alt="Album art"
             class="w-10 h-10 rounded-full shadow-md {% if track.is_playing %}spotify-spin{% endif %}" loading="lazy">
        {% if track.is_playing %}
        <span class="absolute -top-0.5 -right-0.5 w-3 h-3 bg-green-500 rounded-full border-2 border-white dark:border-gray-900 spotify-pulse"></span>
        {% endif %}
    </div>

    <!-- Track Info -->
    <div class="min-w-0 max-w-[160px]">
        <p class="text-[13px] font-semibold text-gray-900 dark:text-white truncate leading-tight">{{ track.track_name }}</p>
        <p class="text-[11px] text-gray-500 dark:text-gray-400 truncate leading-tight">{{ track.artist }}</p>
    </div>

    <!-- Equalizer Bars / Spotify logo -->
    {% if track.is_playing %}
    <div class="flex items-end gap-[3px] h-4 ml-1 flex-shrink-0">
        <span class="eq-bar w-[3px] rounded-full bg-green-500"></span>
        <span class="eq-bar w-[3px] rounded-full bg-green-500" style="animation-delay: 0.2s"></span>
        <span class="eq-bar w-[3px] rounded-full bg-green-500" style="animation-delay: 0.4s"></span>
        <span class="eq-bar w-[3px] rounded-full bg-green-500" style="animation-delay: 0.1s"></span>
    </div>
    {% else %}
    <svg class="w-4 h-4 text-green-500/60 flex-shrink-0 ml-1 group-hover:text-green-500 transition-colors" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
    </svg>
    {% endif %}
</a>
{% else %}
<div class="spotify-container flex items-center gap-2.5 pl-2.5 pr-4 py-2 rounded-full
            bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl
            border border-gray-200/60 dark:border-gray-700/40
            shadow-lg shadow-black/5 dark:shadow-black/30">
    <svg class="w-5 h-5 text-gray-300 dark:text-gray-600 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
    </svg>
    <span class="text-xs text-gray-400 dark:text-gray-500">Offline</span>
</div>
{% endif %}
